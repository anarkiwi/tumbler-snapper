name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Format
        run: black --check src/ tests/
      - name: Lint
        run: pylint src/
      - name: Test
        run: pytest -m "not oracle and not hvsc" -n auto --cov=tsnap --cov-fail-under=85

  oracle:
    # Advisory: byte-exact SID register-stream comparison of the IR-VM against the
    # Dockerized sidplayfp/sidtrace oracle and real HVSC tunes. Separate,
    # non-required job so a flaky oracle or HVSC fetch never blocks the hermetic
    # unit CI above. HVSC .sid tunes are cached, never committed.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,oracle]"
      - name: Cache HVSC tunes
        uses: actions/cache@v4
        with:
          path: .oracle-cache
          key: oracle-${{ hashFiles('tests/fixtures.py') }}
      - name: Pull sidtrace oracle image
        run: docker pull anarkiwi/sidtrace:latest
      - name: Oracle test
        run: pytest -m "oracle or hvsc" -n auto
      - name: Token metric report (informational)
        run: python tools/token_report.py token-metric.txt
      - name: Upload token metric
        uses: actions/upload-artifact@v4
        with:
          name: token-metric
          path: token-metric.txt
